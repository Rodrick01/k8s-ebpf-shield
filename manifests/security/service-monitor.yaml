apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ebpf-shield-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: ebpf-shield
  endpoints:
  - port: metrics
    interval: 15s
  namespaceSelector:
    matchNames:
    - kube-system
